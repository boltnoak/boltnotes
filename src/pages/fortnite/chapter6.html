<!DOCTYPE html>
<html lang="pt-br">
<head>
    <base href="../../">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoltNotes - Fortnite: Capítulo 6</title>
    <link rel="stylesheet" href="css/fortnite/chapter.css">
</head>
<body>
<div class="pageBody">
    <div id="seasons-list-container"></div>

    <template id="season-template">
        <div class="fn-season" data-code="">
            <div class="seasonTitle-div">
                <p class="season-title"></p>
                <i class="season-trailers fa-solid fa-circle-play" data-tooltip="Ver trailers"></i>
            </div>
            <div class="banner"></div>
            <div class="season" data-locked="true">
                <div class="season-tags">
                    <p class="status"><i class="fa-solid fa-star"></i>Nota: <span contenteditable="true"></span></p>
                    <p class="status"><i class="fa-solid fa-square-caret-up"></i>Níveis: <span contenteditable="true"></span></p>
                    <p class="status"><i class="fa-solid fa-trophy"></i>Vitórias: <span contenteditable="true"></span></p>
                    <p class="status"><i class="fa-solid fa-calendar-day"></i>Lançado em: <span></span></p>
                </div>
                <div class="season-status">
                    <div class="passe-status">
                        <img class="season-character">
                    </div>
                    <div class="season-content">
                        <div class="review-section"></div>
                    </div>
                </div>
            </div>
            <div class="season-contents">
                    <div class="season-events" style="display: none;" onclick="openLiveEvent(this)">
                        <img class="event-img">
                        <div class="event-data">
                            <p class="event-title"></p>
                            <div class="event-tags">
                                <p class="tag event-type"></p>
                                <p class="tag event-date"></p>
                            </div>
                        </div>
                    </div>
                <div class="seasonMap-div"><img class="season-map"></div>
            </div>
        </div>
    </template>
    <div id="end-event" data-code="zero-hour" onclick="watchEndEvent()">
    <div id="endEvent-cover">
        <div class="endEvent-data">
            <p class="endEvent-title">Hora Zero</p>
            <p class="endEvent-date">29/11/2025</p>
        </div>
        
        <div id="endEventVideo-player">
            <p id="volume"></p>
            <div class="video-wrapper">
                <div id="controls-hover-event"></div>
                <p id="video-title-event"></p>
                <i id="video-close-event" class="fa-solid fa-window-minimize" onclick="minimizeVideo(event)"></i>
                
                <video id="video-event" onclick="togglePlay(event, this)" preload="none"></video>
                
                <div id="player-controls-event">
                    <i id="play-pause" class="fa-solid fa-play" onclick="togglePlay(event, this)"></i>
                    <div id="player-bar-event" onclick="window.seek(event, this)">
                        <div id="player-bar-fill-event"></div>
                    </div>
                    <i id="mute" class="fa-solid fa-volume" onclick="muteVideo(event, this)"></i>
                    <i id="toggle-fullscreen" class="fa-solid fa-up-right-and-down-left-from-center" onclick="toggleFullscreen(event, this)"></i>
                </div>
            </div>
        </div>
    </div>
</div>
<footer></footer>
</div>
</div>

<header>
    <a class="back">Voltar</a>
    <div class="chapter-section">
        <i id="before-chapter"></i>
        <p id="chapter-name"></p>
        <i id="next-chapter"></i>
    </div>
</header>

<div id="loading-screen">
    <div class="spinner"></div>
</div>

<script src="scripts/global.js"></script>
<script src="scripts/basics.js"></script>
<script src="scripts/videoplayer.js"></script>
<script src="scripts/fortnite/chapter.js"></script>
<script src="scripts/fortnite/reviews.js"></script>
<script src="scripts/fortnite/trailers.js"></script>
</body>
</html>
