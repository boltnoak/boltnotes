<!DOCTYPE html>
<html lang="pt-br">
<head>
    <base href="../">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoltNotes</title>
    <link rel="stylesheet" href="css/index.css">
    <script src="scripts/theme-loader.js"></script>
</head>
<body>
<div class="app-container">
    <div class="pageBody">
    <div class="banner">
        <div class="boltnotes-logo-div">
            <div class="boltnotes-logo"></div>
        </div>
    </div>
    <div class="banner-bar"></div>
    <div class="pages-section">
        <a class="page" id="games" href="pages/games.html">
            <div class="page-image">
                <img src="assets://games-image.png">
            </div>
            <p class="page-title">Backlog de Jogos</p>
            <div class="info">
                <p id="games-zerados"></p>
                <p id="games-platinados"></p>
            </div>
        </a>
        <a class="page" id="notes" href="pages/notes.html">
            <div class="page-image">
                <img src="assets://notes-image.png">
            </div>
            <p class="page-title">Notas</p>
            <div class="info">
                <p id="note-count"></p>
            </div>
        </a>
        <a class="page" id="fortnite" href="pages/fortnite.html">
            <div class="page-image">
                <div class="page-image-text"></div>
                <img id="latest-season">
                <div class="shine-effect-v"></div>
            </div>
            <p class="page-title">Fortnite</p>
            <div class="info">
                <p id="chapter-count"></p>
                <p id="season-count"></p>
            </div>
        </a>
    </div>
    <div class="sep-bar"></div>
    <div class="page-infos">
            <div id="featured-title">Destaque<i class="fa-solid fa-gamepad"></i></div>
            
            <div class="recentSeason-panel">
                <div class="recent-season">
                    <img id="recentSeason-image">
                    <div class="season-status">
                        <p id="recent-season-name"></p>
                        <div class="season-status-div">
                            <p class="status">
                                <i class="fa-solid fa-square-caret-up"></i>
                                Níveis: 
                                <i class="statusLevel-add fa-solid fa-plus"></i> <span class="status-level">~</span>
                                <i class="statusLevel-minus fa-solid fa-minus"></i>
                            </p>
                            <p class="status">
                                <i class="fa-solid fa-trophy"></i>
                                Vitórias: 
                                <i class="statusWin-add fa-solid fa-plus"></i> <span class="status-win">~</span>
                                <i class="statusWin-minus fa-solid fa-minus"></i>
                            </p>
                        </div>
                        <div class="level-progress">
                            <p class="level-progress-text">Passe:</p>
                            <div class="level-progress-bar">
                                <p class="level-progress-bar-fill"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="playingNow-panel">
                <div id="playingNow-games"></div>
            </div>
        </div>
    </div>

    <header>
        <div class="app-version">
            <span id="app-version"></span>
        </div>
        <a class="config" href="pages/config.html">
            <i id="config" class="fa-solid fa-gear" data-tooltip="Configurações"></i>
        </a>
    </header>

    <div id="changelog-popup">
        <div class="changelog-content">
            <div class="changelog-title">
                <h2 id="changelog-version"></h2>
                <i id="close-changelog-btn" class="fa-solid fa-xmark"></i>
            </div>
            <p class="changelog-sep-bar"></p>
            <ul id="changelog-list"></ul>
        </div>
    </div>

    <div id="loading-screen">
        <div class="spinner"></div>
    </div>

    <div id="starting-screen">
        <div class="loading-content">
            <h2 id="loading-title">Sincronizando Assets</h2>

            <div class="spinner-div">
                <div class="spinner"></div>
            </div>
            <div class="loading-details-div">
                <p id="loading-details">Verificando pacotes...</p>
                <p id="loading-progress"></p>
            </div>
            
            <div class="progress-container">
                <div id="progress-bar-fill">
                    <div class="shine-effect"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="scripts/global.js"></script>
<script src="scripts/basics.js"></script>
<script src="scripts/index.js"></script>
</body>
</html>
