<!DOCTYPE html>
<html lang="pt-br">
<head>
    <base href="../">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoltNotes — Backlog de Jogos</title>
    <link rel="stylesheet" href="css/games.css">
    <script src="scripts/theme-loader.js"></script>
</head>
<body>
<div class="app-container">
    <div class="pageBody">
        <div class="sidebar">
            <div class="playingNowSection">
                <div id="playingNowSection-title"><p><i class="fa-solid fa-gamepad"></i>Jogando no momento</p></div>
                <div class="playingNow-panel">
                    <div id="playingNow-games"></div>
                </div>
            </div>
            <div class="add-game-form">
                <div class="add-game-form-title"><i class="fa-solid fa-square-plus"></i><p>Novo jogo</p></div>
                <input type="text" id="gameName" placeholder="Nome">
                <div class="appid-div">
                    <input type="text" id="gameAppId" placeholder="AppID">
                    <!-- <a class="steamdb-btn" id="steamdb-btn" onclick="searchAppID()" target="_blank">
                        <i class="fa-solid fa-folder-open"></i></a> -->
                    <i class="steamdb-btn fa-solid fa-magnifying-glass" id="steamdb-btn" onclick="searchAppID()" target="_blank"></i></a>
                </div>
                <div class="add-game-form-options">
                    <a id="addGameBtn"><i class="fa-solid fa-plus"></i>Adicionar</a>
                </div>
            </div>
        </div>
        <p class="sep-bar-v"></p>
        <div class="page-content">
            <div class="modes">
                <p class="mode-btn campaign active">Campanhas</p>
                <p class="mode-btn achievements">Conquistas</p>
            </div>
            <div class="view-bar">
                <div class="view-options">
                    <i id="view-grid" class="fa-solid fa-grip active"></i>
                    <i id="view-list" class="fa-solid fa-bars"></i>
                </div>
                <div class="sorting-addGame">
                    <div class="sorting-options">
                        <select id="realSorting-options">
                            <option value="date-recent">Mais recente</option>
                            <option value="date-old">Mais antigo</option>
                            <option value="rating-high">Maior nota</option>
                            <option value="rating-low">Menor nota</option>
                        </select>
                        <div class="sortingOptions-trigger">
                            <span>Mais recente</span>
                            <i class="fa-solid fa-angle-down"></i>
                        </div>
                        <ul class="sortingOptions-select">
                            <li data-value="date-recent" class="selected">Mais recente</li>
                            <li data-value="date-old">Mais antigo</li>
                            <li data-value="rating-high">Maior nota</li>
                            <li data-value="rating-low">Menor nota</li>
                        </ul>
                    </div>
                </div>
            </div>
            <div id="view-games" class="grid active"></div>
            <div id="view-achie" class="grid"></div>
        </div>
    </div>

    <!-- <div class="game-popup-div">
        <div class="game-popup">

        </div>
    </div> -->

    <header>
        <a class="back" href="pages/index.html">Voltar<i class="fa-solid fa-caret-left"></i></a>
    </header>

    <div id="loading-screen">
        <div class="spinner"></div>
    </div>
</div>

<script src="scripts/global.js"></script>
<script src="scripts/basics.js"></script>
<script src="scripts/games.js"></script>
</body>
</html>
